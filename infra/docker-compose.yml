version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nutrisync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutrisync}
      POSTGRES_DB: ${POSTGRES_DB:-nutrisync}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning

volumes:
  pg_data:
